<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Test Day 4 - Debug</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .test { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .pass { background: #1e3a1e; border-left: 4px solid #4caf50; }
        .fail { background: #3a1e1e; border-left: 4px solid #f44336; }
        .info { background: #1e2a3a; border-left: 4px solid #2196f3; }
        h1 { color: #61dafb; }
        h2 { color: #98c379; margin-top: 20px; }
        pre { background: #282c34; padding: 10px; border-radius: 5px; overflow-x: auto; }
        button {
            background: #61dafb;
            border: none;
            padding: 10px 20px;
            margin: 10px 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #4fa8c5; }
    </style>
</head>
<body>
    <h1>🔍 4th Grade Day 4 Diagnostic</h1>
    <div id="results"></div>
    
    <h2>Manual Actions:</h2>
    <button onclick="loadActualLesson()">Load Actual Day 4</button>
    <button onclick="window.location.reload()">Reload This Page</button>
    
    <script>
        const results = document.getElementById('results');
        
        function addResult(title, status, details) {
            const div = document.createElement('div');
            div.className = `test ${status}`;
            div.innerHTML = `<strong>${status === 'pass' ? '✅' : status === 'fail' ? '❌' : 'ℹ️'} ${title}</strong>${details ? '<pre>' + details + '</pre>' : ''}`;
            results.appendChild(div);
        }
        
        async function runDiagnostics() {
            addResult('Starting diagnostics...', 'info');
            
            // Test 1: Check if fetch works
            try {
                const response = await fetch('4th-grade-day-004.html');
                const text = await response.text();
                addResult('Fetch Day 4 HTML', 'pass', `Status: ${response.status}\nSize: ${text.length} bytes`);
                
                // Test 2: Check if lesson config exists
                if (text.includes('lesson4Config')) {
                    addResult('Found lesson4Config', 'pass');
                } else {
                    addResult('Missing lesson4Config', 'fail', 'The HTML file does not contain lesson4Config');
                }
                
                // Test 3: Check format
                if (text.includes('render: () => `')) {
                    addResult('Correct format (render function)', 'pass');
                } else if (text.includes('"type":')) {
                    addResult('WRONG FORMAT (old JSON)', 'fail', 'File still uses old "type" format');
                } else {
                    addResult('Unknown format', 'fail', 'Cannot determine page format');
                }
                
                // Test 4: Check for skill content
                if (text.includes('Prefixes and Suffixes')) {
                    addResult('Skill content present', 'pass', 'Found: Prefixes and Suffixes');
                } else {
                    addResult('Missing skill content', 'fail');
                }
                
                // Test 5: Extract first 200 chars of lesson config
                const configMatch = text.match(/const lesson4Config = \{[\s\S]{0,500}/);
                if (configMatch) {
                    addResult('Lesson Config Preview', 'info', configMatch[0] + '...');
                }
                
            } catch (error) {
                addResult('Fetch Failed', 'fail', error.message);
            }
            
            // Test 6: Check if lesson-viewer.js loads
            try {
                const jsResponse = await fetch('js/lesson-viewer.js');
                const jsText = await jsResponse.text();
                addResult('Lesson Viewer JS', jsResponse.ok ? 'pass' : 'fail', 
                    `Status: ${jsResponse.status}\nSize: ${jsText.length} bytes`);
                
                // Check if initLessonViewer function exists
                if (jsText.includes('function initLessonViewer')) {
                    addResult('initLessonViewer function found', 'pass');
                } else if (jsText.includes('initLessonViewer')) {
                    addResult('initLessonViewer referenced but not defined as function', 'fail');
                } else {
                    addResult('initLessonViewer missing entirely', 'fail');
                }
            } catch (error) {
                addResult('JS Load Failed', 'fail', error.message);
            }
            
            // Test 7: Check CSS
            try {
                const cssResponse = await fetch('css/lesson-viewer.css');
                addResult('Lesson Viewer CSS', cssResponse.ok ? 'pass' : 'fail',
                    `Status: ${cssResponse.status}`);
            } catch (error) {
                addResult('CSS Load Failed', 'fail', error.message);
            }
            
            // Test 8: Service Worker Status
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                if (registrations.length > 0) {
                    addResult('Service Workers Active', 'info', 
                        `Found ${registrations.length} registration(s)\n` +
                        registrations.map(r => r.scope).join('\n'));
                } else {
                    addResult('No Service Workers', 'pass', 'Good - service workers unregistered');
                }
            }
            
            // Test 9: Cache Status
            if ('caches' in window) {
                const cacheNames = await caches.keys();
                if (cacheNames.length > 0) {
                    addResult('Caches Found', 'info', 
                        `${cacheNames.length} cache(s):\n${cacheNames.join('\n')}`);
                } else {
                    addResult('No Caches', 'pass', 'Good - caches cleared');
                }
            }
            
            addResult('Diagnostics Complete', 'pass', 
                'Check results above. If all tests pass but Day 4 still shows blue screen, there may be a browser-specific issue.');
        }
        
        function loadActualLesson() {
            window.location.href = '4th-grade-day-004.html?t=' + Date.now();
        }
        
        // Auto-run on load
        runDiagnostics();
    </script>
</body>
</html>
