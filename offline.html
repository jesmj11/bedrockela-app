<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - BedrockELA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #305853 0%, #1B2A30 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        .offline-container {
            max-width: 500px;
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 800;
        }
        
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .btn {
            background: white;
            color: #305853;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
            font-family: 'Nunito', sans-serif;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
        
        .cached-lessons {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }
        
        .cached-lessons h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
        }
        
        .cached-lessons p {
            font-size: 1rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="icon">📚</div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Don't worry - you can still access lessons you've already opened!</p>
        
        <button class="btn" onclick="location.reload()">
            Try Again
        </button>
        
        <button class="btn" onclick="goToLogin()" style="margin-left: 10px; background: transparent; color: white; border: 2px solid white;">
            Go to Login
        </button>
        
        <div class="cached-lessons">
            <h2>📖 Offline Learning</h2>
            <p>Previously opened lessons are saved on your device and can be accessed offline.</p>
        </div>
    </div>
    
    <script>
        function goToLogin() {
            window.location.href = '/student-login.html';
        }
        
        // Check if we're back online
        window.addEventListener('online', () => {
            location.reload();
        });
    </script>
</body>
</html>
