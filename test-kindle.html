<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindle Test - Simple Nav</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }
        
        .top-bar {
            background: #305853;
            color: white;
            padding: 15px;
            text-align: center;
        }
        
        .content {
            background: white;
            margin: 20px;
            padding: 30px;
            min-height: 400px;
            border-radius: 10px;
        }
        
        .bottom-bar {
            background: #305853;
            color: white;
            padding: 15px;
            text-align: center;
        }
        
        .btn {
            background: #B06821;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 0 10px;
            border-radius: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>Top Navigation</h1>
    </div>
    
    <div class="content">
        <h2>Page Content</h2>
        <p>This is the lesson content.</p>
        <p>Scroll down to see the bottom navigation.</p>
        <p style="margin-top: 200px;">Keep scrolling...</p>
        <p style="margin-top: 100px;">Almost there...</p>
    </div>
    
    <div class="bottom-bar">
        <button class="btn">← Previous</button>
        <span style="color: white; font-weight: bold;">Page 1 of 13</span>
        <button class="btn">Next →</button>
    </div>
</body>
</html>
