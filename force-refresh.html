<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Cache - BedrockELA</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .card {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #764ba2;
        }
        .status {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
        }
        .success {
            color: #28a745;
        }
        .error {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔄 Clear Cache & Reload</h1>
        <p>If you're seeing old content or blue screens, click below to clear your cache and reload the latest lessons.</p>
        
        <button onclick="clearCacheAndReload()">Clear Cache & Reload</button>
        <br>
        <button onclick="goHome()">Go to Homepage</button>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        async function clearCacheAndReload() {
            const status = document.getElementById('status');
            status.textContent = 'Clearing cache...';
            status.className = 'status';
            
            try {
                // Unregister service worker
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                    }
                }
                
                // Clear all caches
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    await Promise.all(
                        cacheNames.map(cacheName => caches.delete(cacheName))
                    );
                }
                
                // Clear local storage and session storage
                localStorage.clear();
                sessionStorage.clear();
                
                status.textContent = '✅ Cache cleared! Reloading in 2 seconds...';
                status.className = 'status success';
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
                
            } catch (error) {
                status.textContent = '❌ Error: ' + error.message;
                status.className = 'status error';
            }
        }
        
        function goHome() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
