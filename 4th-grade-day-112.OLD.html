odman. “That is proof that he is sharp,” remarked the Lion. “Well, I must go to Oz and get my heart,” said the Woodman. So he walked to the Throne Room and knocked at the door. “Come in,” called Oz, and the Woodman entered and said, “I have come for my heart.” “Very well,” answered the little man. “But I shall have to cut a hole in your breast, so I can put your heart in the right place. I hope it won’t hurt you.” “Oh, no,” answered the Woodman. “I shall not feel it at all.” So Oz brought a pair of tinsmith’s shears and cut a small, square hole in the left side of the Tin Woodman’s breast. Then, going to a chest of drawers, he took out a pretty heart, made entirely of silk and stuffed with sawdust. “Isn’t it a beauty?” he asked. “It is, indeed!” replied the Woodman, who was greatly pleased. “But is it a kind heart?” “Oh, very!” answered Oz. He put the heart in the Woodman’s breast and then replaced the square of tin, soldering it neatly together where it had been cut. “There,” said he; “now you have a heart that any man might be proud of. I’m sorry I had to put a patch on your breast, but it really couldn’t be helped.” “Never mind the patch,” exclaimed the happy Woodman. “I am very grateful to you, and shall never forget your kindness.” “Don’t speak of it,” replied Oz. Then the Tin Woodman went back to his friends, who wished him every joy on account of his good fortune. The Lion now walked to the Throne Room and knocked at the door. “Come in,” said Oz. “I have come for my courage,” announced the Lion, entering the room. “Very well,” answered the little man; “I will get it for you.” He went to a cupboard and reaching up to a high shelf took down a square green bottle, the contents of which he poured into a green-gold dish, beautifully carved. Placing this before the Cowardly Lion, who sniffed at it as if he did not like it, the Wizard said: “Drink.” “What is it?” asked the Lion. “Well,” answered Oz, “if it were inside of you, it would be courage. You know, of course, that courage is always inside one; so that this really cannot be called courage until you have swallowed it. Therefore I advise you to drink it as soon as possible.” The Lion hesitated no longer, but drank till the dish was empty. “How do you feel now?” asked Oz. “Full of courage,” replied the Lion, who went joyfully back to his friends to tell them of his good fortune. Oz, left to himself, smiled to think of his success in giving the Scarecrow and the Tin Woodman and the Lion exactly what they thought they wanted. “How can I help being a humbug,” he said, “when all these people make me do things that everybody knows can’t be done? It was easy to make the Scarecrow and the Lion and the Woodman happy, because they imagined I could do anything. But it will take more than imagination to carry Dorothy back to Kansas, and I’m sure I don’t know how it can be done.”</p>
