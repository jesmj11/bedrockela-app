e had been struck by a cannon ball. Dorothy ran down and helped the Scarecrow to his feet, and the Lion came up to her, feeling rather bruised and sore, and said, “It is useless to fight people with shooting heads; no one can withstand them.” “What can we do, then?” she asked. “Call the Winged Monkeys,” suggested the Tin Woodman. “You have still the right to command them once more.” “Very well,” she answered, and putting on the Golden Cap she uttered the magic words. The Monkeys were as prompt as ever, and in a few moments the entire band stood before her. “What are your commands?” inquired the King of the Monkeys, bowing low. “Carry us over the hill to the country of the Quadlings,” answered the girl. “It shall be done,” said the King, and at once the Winged Monkeys caught the four travelers and Toto up in their arms and flew away with them. As they passed over the hill the Hammer-Heads yelled with vexation, and shot their heads high in the air, but they could not reach the Winged Monkeys, which carried Dorothy and her comrades safely over the hill and set them down in the beautiful country of the Quadlings. “This is the last time you can summon us,” said the leader to Dorothy; “so good-bye and good luck to you.” “Good-bye, and thank you very much,” returned the girl; and the Monkeys rose into the air and were out of sight in a twinkling. The country of the Quadlings seemed rich and happy. There was field upon field of ripening grain, with well-paved roads running between, and pretty rippling brooks with strong bridges across them. The fences and houses and bridges were all painted bright red, just as they had been painted yellow in the country of the Winkies and blue in the country of the Munchkins. The Quadlings themselves, who were short and fat and looked chubby and good-natured, were dressed all in red, which showed bright against the green grass and the yellowing grain. The Monkeys had set them down near a farmhouse, and the four travelers walked up to it and
