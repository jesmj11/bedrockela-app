<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clearing Cache...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .log {
            margin-top: 20px;
            font-size: 14px;
            text-align: left;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-item {
            margin: 5px 0;
        }
        .success { color: #4ade80; }
        .error { color: #f87171; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 Clearing Cache...</h1>
        <p>Forcing fresh content from server</p>
        <div class="spinner"></div>
        <div class="log" id="log"></div>
    </div>

    <script>
        const log = document.getElementById('log');
        
        function addLog(message, type = 'info') {
            const item = document.createElement('div');
            item.className = `log-item ${type}`;
            item.textContent = `✓ ${message}`;
            log.appendChild(item);
            log.scrollTop = log.scrollHeight;
            console.log(message);
        }

        async function clearEverything() {
            try {
                // 1. Unregister all service workers
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                        addLog('Unregistered service worker', 'success');
                    }
                }

                // 2. Clear all caches
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    for (let cacheName of cacheNames) {
                        await caches.delete(cacheName);
                        addLog(`Deleted cache: ${cacheName}`, 'success');
                    }
                }

                // 3. Clear localStorage
                localStorage.clear();
                addLog('Cleared localStorage', 'success');

                // 4. Clear sessionStorage
                sessionStorage.clear();
                addLog('Cleared sessionStorage', 'success');

                // 5. Get target URL from query param or default
                const urlParams = new URLSearchParams(window.location.search);
                const redirectTo = urlParams.get('redirect') || '/4th-grade-day-004.html';
                
                addLog(`Redirecting to: ${redirectTo}`, 'success');
                
                // 6. Wait a moment, then redirect with cache-busting param
                setTimeout(() => {
                    const freshUrl = `${redirectTo}?nocache=${Date.now()}`;
                    window.location.href = freshUrl;
                }, 2000);

            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
                console.error(error);
            }
        }

        // Start clearing immediately
        clearEverything();
    </script>
</body>
</html>
