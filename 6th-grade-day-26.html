<p style="margin-bottom: 15px; line-height: 1.8;">Vacation was approaching. The schoolmaster, always severe, grew severer

<p style="margin-bottom: 15px; line-height: 1.8;">Dark and tempestuous was night. Around the throne on high not a single

<p style="margin-bottom: 15px; line-height: 1.8;">Now the master, mellow almost to the verge of geniality, put his chair
